.title{fill:#e6edf3}.subtitle{fill:#8b949e}.lang-name{fill:#e6edf3}
.lang-count{fill:#8b949e}.lang-pct{fill:#e6edf3}.bar-bg{fill:#21262d}}
</style>
<text x="24" y="38" class="title">📊 Languages by Commits</text>
<text x="24" y="56" class="subtitle">4 commits across 1 language</text>
<rect x="24" y="68" width="492" height="10" rx="5" class="bar-bg"/>
<rect x="24" y="68" width="492" height="10" rx="0" fill="#f1e05a"/>
<circle cx="30" cy="102" r="5" fill="#f1e05a"/>
<text x="42" y="106" class="lang-name">JavaScript</text>
<text x="446" y="106" class="lang-count" text-anchor="end">4 commits</text>
<text x="516" y="106" class="lang-pct" text-anchor="end">100.0%</text>
</svg>