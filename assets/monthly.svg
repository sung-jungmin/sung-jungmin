<svg xmlns="http://www.w3.org/2000/svg" width="900" height="628" viewBox="0 0 900 628" font-family="'Styrene B', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
