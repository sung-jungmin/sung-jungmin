<svg xmlns="http://www.w3.org/2000/svg" width="540" height="464" viewBox="0 0 540 464" font-family="'Styrene B', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
