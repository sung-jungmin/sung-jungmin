<svg xmlns="http://www.w3.org/2000/svg" width="900" height="230" viewBox="0 0 900 230" font-family="'Styrene B', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<style>
.label{fill:#5A574E;font-size:12px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase}
.num{fill:#181818;font-size:68px;font-weight:400;letter-spacing:-2.5px;font-family:'Tiempos Headline', 'Source Serif Pro', Georgia, 'Times New Roman', serif}
.num-coral{fill:#CC785C;font-size:68px;font-weight:400;letter-spacing:-2.5px;font-family:'Tiempos Headline', 'Source Serif Pro', Georgia, 'Times New Roman', serif}
.num-text{fill:#181818;font-size:48px;font-weight:400;letter-spacing:-0.5px;font-family:'Tiempos Headline', 'Source Serif Pro', Georgia, 'Times New Roman', serif}
.unit{fill:#5A574E;font-size:13px}
.divider{stroke:#E0DCC9;stroke-width:1}
.progress-label{fill:#181818;font-size:13px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase}
.progress-meta{fill:#5A574E;font-size:13px}
.progress-pct{fill:#CC785C;font-size:14px;font-weight:700;font-family:'Tiempos Headline', 'Source Serif Pro', Georgia, 'Times New Roman', serif}
.bar-bg{fill:#E0DCC9}
.bar-fill{fill:#CC785C}
.tick{stroke:#C9C2AB;stroke-width:1.2}
.pulse{animation:pulse 2.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@media (prefers-reduced-motion: reduce){.pulse{animation:none}}
@media (prefers-color-scheme: dark){
.label{fill:#A19E92}.num{fill:#F0EEE6}.num-coral{fill:#E5947A}.num-text{fill:#F0EEE6}
.unit{fill:#A19E92}.divider{stroke:#3D3A33}
.progress-label{fill:#F0EEE6}.progress-meta{fill:#A19E92}.progress-pct{fill:#E5947A}
.bar-bg{fill:#3D3A33}.bar-fill{fill:#E5947A}.tick{stroke:#4D4A40}
}
</style>
<line x1="300" y1="42" x2="300" y2="146" class="divider"/>
<line x1="600" y1="42" x2="600" y2="146" class="divider"/>
<text x="150" y="58" class="label" text-anchor="middle">total contributions</text>
<text x="150" y="120" class="num" text-anchor="middle">195</text>
<text x="150" y="142" class="unit" text-anchor="middle">W&apos;s in 2026 so far</text>
<text x="450" y="58" class="label" text-anchor="middle">on streak rn</text>
<text x="450" y="120" class="num-coral pulse" text-anchor="middle">1</text>
<text x="450" y="142" class="unit" text-anchor="middle">day going</text>
<text x="750" y="58" class="label" text-anchor="middle">peak grind day</text>
<text x="750" y="120" class="num-text" text-anchor="middle">Sun</text>
<text x="750" y="142" class="unit" text-anchor="middle">most active weekday</text>
<line x1="80" y1="166" x2="820" y2="166" class="divider"/>
<text x="80" y="188" class="progress-label">2026 progress</text>
<text x="820" y="188" class="progress-pct" text-anchor="end">55.1%</text>
<text x="450" y="188" class="progress-meta" text-anchor="middle">on pace for ~354 by EOY</text>
<rect x="80" y="196" width="740" height="10" rx="5" class="bar-bg"/>
<rect x="80" y="196" width="407.76925571790963" height="10" rx="5" class="bar-fill"/>
<line x1="265" y1="209" x2="265" y2="214" class="tick"/>
<line x1="450" y1="209" x2="450" y2="214" class="tick"/>
<line x1="635" y1="209" x2="635" y2="214" class="tick"/>
</svg>