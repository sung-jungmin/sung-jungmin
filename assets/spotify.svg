<svg xmlns="http://www.w3.org/2000/svg" width="540" height="160" viewBox="0 0 540 160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<style>
.bg { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
.icon-bg { fill: #1DB954; opacity: 0.15; }
.icon-glow { fill: #1DB954; opacity: 0.08; }
.label { fill: #656d76; font-size: 11px; font-weight: 700; letter-spacing: 1.2px; }
.title { fill: #1f2328; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.desc { fill: #656d76; font-size: 12px; }
.cta { fill: #1DB954; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
.bar { fill: #1DB954; }
.note { fill: #1DB954; font-size: 22px; font-weight: 700; }
@media (prefers-color-scheme: dark) {
  .bg { fill: #161b22; stroke: #30363d; }
  .label { fill: #8b949e; }
  .title { fill: #e6edf3; }
  .desc { fill: #8b949e; }
}
</style>

<rect x="2" y="2" width="536" height="156" rx="14" class="bg" />

<g transform="translate(54, 64)">
  <circle cx="0" cy="0" r="32" class="icon-glow">
    <animate attributeName="r" values="32;36;32" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="0" cy="0" r="26" class="icon-bg" />
  <text x="0" y="9" text-anchor="middle" class="note">♪</text>
</g>

<text x="110" y="42" class="label">🎵 CURRENTLY JAMMING TO</text>

<text x="110" y="76" class="title">Lofi Beats</text>

<text x="110" y="98" class="desc">chill beats for the commit grind · spotify official 💚</text>

<text x="110" y="134" class="cta">▶ tap to vibe on spotify →</text>

<g transform="translate(450, 80)">
  <rect x="0" y="-10" width="4" height="20" rx="2" class="bar">
    <animate attributeName="height" values="20;6;20" dur="0.7s" repeatCount="indefinite" />
    <animate attributeName="y" values="-10;-3;-10" dur="0.7s" repeatCount="indefinite" />
  </rect>
  <rect x="10" y="-14" width="4" height="28" rx="2" class="bar">
    <animate attributeName="height" values="28;8;28" dur="0.9s" repeatCount="indefinite" />
    <animate attributeName="y" values="-14;-4;-14" dur="0.9s" repeatCount="indefinite" />
  </rect>
  <rect x="20" y="-8" width="4" height="16" rx="2" class="bar">
    <animate attributeName="height" values="16;24;16" dur="0.6s" repeatCount="indefinite" />
    <animate attributeName="y" values="-8;-12;-8" dur="0.6s" repeatCount="indefinite" />
  </rect>
  <rect x="30" y="-12" width="4" height="24" rx="2" class="bar">
    <animate attributeName="height" values="24;10;24" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="y" values="-12;-5;-12" dur="0.8s" repeatCount="indefinite" />
  </rect>
  <rect x="40" y="-10" width="4" height="20" rx="2" class="bar">
    <animate attributeName="height" values="20;28;20" dur="0.7s" repeatCount="indefinite" />
    <animate attributeName="y" values="-10;-14;-10" dur="0.7s" repeatCount="indefinite" />
  </rect>
</g>
</svg>
