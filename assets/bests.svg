<svg xmlns="http://www.w3.org/2000/svg" width="720" height="140" viewBox="0 0 720 140" font-family="'Styrene B', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<style>
.card{fill:#FAF9F5;stroke:#E0DCC9;stroke-width:1}
.card-icon{font-size:18px}
.card-label{fill:#5A574E;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.card-value{fill:#181818;font-size:30px;font-weight:400;letter-spacing:-1px;font-family:'Tiempos Headline', 'Source Serif Pro', Georgia, 'Times New Roman', serif}
.card-value-coral{fill:#CC785C;font-size:30px;font-weight:400;letter-spacing:-1px;font-family:'Tiempos Headline', 'Source Serif Pro', Georgia, 'Times New Roman', serif}
.card-unit{fill:#5A574E;font-size:10px}
@media (prefers-color-scheme: dark){
.card{fill:#26241F;stroke:#3D3A33}
.card-label{fill:#A19E92}.card-value{fill:#F0EEE6}.card-value-coral{fill:#E5947A}.card-unit{fill:#A19E92}}
</style>
<rect x="18" y="18" width="160.5" height="104" rx="12" class="card"/>
<text x="34" y="48" class="card-icon">🏆</text>
<text x="62" y="48" class="card-label">best day</text>
<text x="34" y="90" class="card-value">44</text>
<text x="34" y="110" class="card-unit">W&apos;s on May 10</text>
<rect x="192.5" y="18" width="160.5" height="104" rx="12" class="card"/>
<text x="208.5" y="48" class="card-icon">📅</text>
<text x="236.5" y="48" class="card-label">best month</text>
<text x="208.5" y="90" class="card-value">74</text>
<text x="208.5" y="110" class="card-unit">in Jan</text>
<rect x="367" y="18" width="160.5" height="104" rx="12" class="card"/>
<text x="383" y="48" class="card-icon">🔥</text>
<text x="411" y="48" class="card-label">streak</text>
<text x="383" y="90" class="card-value-coral">4</text>
<text x="383" y="110" class="card-unit">days max · 🔥 4 active rn</text>
<rect x="541.5" y="18" width="160.5" height="104" rx="12" class="card"/>
<text x="557.5" y="48" class="card-icon">🚀</text>
<text x="585.5" y="48" class="card-label">first activity</text>
<text x="557.5" y="90" class="card-value">Jan 7</text>
<text x="557.5" y="110" class="card-unit">kicked off 2026</text>
</svg>