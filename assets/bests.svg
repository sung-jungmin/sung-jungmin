<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200" font-family="'Styrene B', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<style>
.card{fill:#FAF9F5;stroke:#E0DCC9;stroke-width:1}
.card-featured{fill:#FAF9F5;stroke:#CC785C;stroke-width:1.8}
.accent-bar{fill:#CC785C}
.card-icon{font-size:24px}
.card-icon-pulse{font-size:24px;animation:flicker 1.8s ease-in-out infinite}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.55}}
@media (prefers-reduced-motion: reduce){.card-icon-pulse{animation:none}}
.card-label{fill:#5A574E;font-size:12px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase}
.card-value{fill:#181818;font-size:44px;font-weight:400;letter-spacing:-1.2px;font-family:'Tiempos Headline', 'Source Serif Pro', Georgia, 'Times New Roman', serif}
.card-value-coral{fill:#CC785C;font-size:44px;font-weight:400;letter-spacing:-1.2px;font-family:'Tiempos Headline', 'Source Serif Pro', Georgia, 'Times New Roman', serif}
.card-unit{fill:#5A574E;font-size:12px}
.divider-thin{stroke:#E0DCC9;stroke-width:1}
@media (prefers-color-scheme: dark){
.card{fill:#26241F;stroke:#3D3A33}
.card-featured{fill:#2A2722;stroke:#E5947A}
.accent-bar{fill:#E5947A}
.card-label{fill:#A19E92}.card-value{fill:#F0EEE6}.card-value-coral{fill:#E5947A}.card-unit{fill:#A19E92}
.divider-thin{stroke:#3D3A33}}
</style>
<rect x="22" y="22" width="200.5" height="156" rx="14" class="card"/>
<text x="42" y="66" class="card-icon">🏆</text>
<text x="78" y="66" class="card-label">best day</text>
<line x1="42" y1="78" x2="202.5" y2="78" class="divider-thin"/>
<text x="42" y="132" class="card-value">44</text>
<text x="42" y="156" class="card-unit">W&apos;s on May 10</text>
<rect x="240.5" y="22" width="200.5" height="156" rx="14" class="card"/>
<text x="260.5" y="66" class="card-icon">📅</text>
<text x="296.5" y="66" class="card-label">best month</text>
<line x1="260.5" y1="78" x2="421" y2="78" class="divider-thin"/>
<text x="260.5" y="132" class="card-value">82</text>
<text x="260.5" y="156" class="card-unit">in May</text>
<rect x="459" y="22" width="200.5" height="156" rx="14" class="card-featured"/>
<rect x="475" y="22" width="48" height="4" rx="2" class="accent-bar"/>
<text x="479" y="66" class="card-icon-pulse">🔥</text>
<text x="515" y="66" class="card-label">streak</text>
<line x1="479" y1="78" x2="639.5" y2="78" class="divider-thin"/>
<text x="479" y="132" class="card-value-coral">4</text>
<text x="479" y="156" class="card-unit">days max · 🔥 4 active rn</text>
<rect x="677.5" y="22" width="200.5" height="156" rx="14" class="card"/>
<text x="697.5" y="66" class="card-icon">🚀</text>
<text x="733.5" y="66" class="card-label">first activity</text>
<line x1="697.5" y1="78" x2="858" y2="78" class="divider-thin"/>
<text x="697.5" y="132" class="card-value">Jan 7</text>
<text x="697.5" y="156" class="card-unit">kicked off 2026</text>
</svg>